<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Ride Viewer</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <button id="toggleUiButton"></button>

  <div id="ui">
    <div class="panelTitle"><strong id="appTitle"></strong></div>

    <div class="fieldRow">
      <label id="csvLabel" for="csvSelect"></label>
      <select id="csvSelect"></select>
    </div>

    <div class="fieldRow">
      <label id="startDateLabel" for="startDate"></label>
      <input type="date" id="startDate" />
    </div>

    <div class="fieldRow">
      <label id="heightScaleLabel" for="heightScale"></label>
      <input type="number" id="heightScale" />
    </div>

    <div class="fieldRow">
      <label id="zStepLabel" for="zStep"></label>
      <input type="number" id="zStep" />
    </div>

    <div class="fieldRow">
      <label id="interpolationModeLabel" for="interpolationMode"></label>
      <select id="interpolationMode"></select>
    </div>

    <div class="fieldRow">
      <label id="curveTypeLabel" for="curveType"></label>
      <select id="curveType"></select>
    </div>

    <div class="fieldRow">
      <label id="curveTensionLabel" for="curveTension"></label>
      <input type="number" id="curveTension" />
    </div>

    <label class="checkboxRow" id="autoScaleLabel" for="autoScale">
      <span></span>
      <input type="checkbox" id="autoScale" />
    </label>

    <div class="fieldRow">
      <label id="rideSpeedLabel" for="rideSpeed"></label>
      <input type="number" id="rideSpeed" />
    </div>

    <div class="fieldRow">
      <label id="lookAheadLabel" for="lookAhead"></label>
      <input type="number" id="lookAhead" />
    </div>

    <label class="checkboxRow" id="invertPriceLabel" for="invertPrice">
      <span></span>
      <input type="checkbox" id="invertPrice" />
    </label>

    <div class="fieldRow">
      <label id="themeLabel" for="themeSelect"></label>
      <select id="themeSelect"></select>
    </div>

    <label class="checkboxRow" id="showHeightGuidesLabel" for="showHeightGuides">
      <span></span>
      <input type="checkbox" id="showHeightGuides" />
    </label>

    <button id="buildButton"></button>

    <div id="status"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
